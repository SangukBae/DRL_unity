train:
  # 학습 규모
  total_timesteps: 1000000

  # SB3 PPO 하이퍼파라미터
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

  # 저장 설정
  save_freq: 10000
  model_save_dir: "models/saved/ppo"
  log_dir: "logs/ppo"
