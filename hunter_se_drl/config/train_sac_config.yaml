train:
  # 학습 규모
  total_timesteps: 1000000
  learning_starts: 10000

  # SB3 SAC 하이퍼파라미터
  learning_rate: 0.0003
  buffer_size: 1000000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  target_entropy: "auto"

  # 저장 설정
  save_freq: 10000
  model_save_dir: "models/saved/sac"
  log_dir: "logs/sac"
