# hyperparameters_tqc.yaml
#
# [역할]
# TQC(Truncated Quantile Critics) 알고리즘의 하이퍼파라미터.
# drl_agent 패키지의 hyperparameters_tqc.yaml을 기반으로 Hunter SE에 맞게 조정한다.
# train_tqc.py가 시작 시 로드한다.
#
# [구현 내용]
# tqc:
#   # 리플레이 버퍼
#   buffer_size:                      버퍼 최대 크기
#   batch_size:                       학습 배치 크기
#
#   # 학습률
#   actor_lr:                         Actor 학습률
#   critic_lr:                        Critic 학습률
#
#   # 네트워크 구조
#   actor_hdim:                       Actor 히든 레이어 크기
#   critic_hdim:                      Critic 히든 레이어 크기
#
#   # TQC 전용 파라미터
#   n_quantiles:                      Critic당 분위수 개수
#   n_critics:                        Critic 네트워크 수
#   top_quantiles_to_drop_per_net:    각 Critic에서 제거할 상위 분위수 수
#
#   # 공통 파라미터
#   discount:                         감가율 (gamma)
#   tau:                              타겟 네트워크 Polyak 계수
#   ent_coef:                         엔트로피 계수 ("auto_1.0" 또는 고정값)
