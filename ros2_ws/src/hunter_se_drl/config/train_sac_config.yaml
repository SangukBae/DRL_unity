# train_sac_config.yaml
#
# [역할]
# SAC 학습 루프 전체를 제어하는 설정.
# 몇 스텝 학습할지, 언제 평가할지, 모델을 어디에 저장할지 등을 정의한다.
# train_sac.py가 시작 시 로드한다.
#
# [구현 내용]
# train:
#   seed:                         난수 시드
#   max_timesteps:                총 학습 스텝 수
#   timesteps_before_training:    랜덤 정책으로 버퍼를 채우는 초기 스텝 수
#   eval_freq:                    평가 주기 (스텝)
#   eval_episodes:                평가당 에피소드 수
#   max_episode_steps:            에피소드당 최대 스텝 수
#
#   # 모델 저장
#   save_model:                   모델 저장 여부
#   checkpoint_freq:              체크포인트 저장 주기 (스텝)
#   model_save_dir:               모델 저장 경로
