# hyperparameters_sac.yaml
#
# [역할]
# SAC(Soft Actor-Critic) 알고리즘의 신경망 구조 및 학습 관련 하이퍼파라미터.
# drl_agent 패키지의 hyperparameters_sac.yaml을 기반으로 Hunter SE에 맞게 조정한다.
# train_sac.py가 시작 시 로드한다.
#
# [구현 내용]
# sac:
#   # 리플레이 버퍼
#   buffer_size:              버퍼 최대 크기
#   batch_size:               학습 배치 크기
#
#   # 학습률
#   actor_lr:                 Actor 네트워크 학습률
#   critic_lr:                Critic 네트워크 학습률
#   alpha_lr:                 엔트로피 온도 학습률 (autotune 시 사용)
#
#   # 네트워크 구조
#   actor_hdim:               Actor 히든 레이어 크기
#   critic_hdim:              Critic 히든 레이어 크기
#
#   # SAC 파라미터
#   discount:                 감가율 (gamma)
#   tau:                      타겟 네트워크 Polyak 계수
#   policy_freq:              Actor 업데이트 주기 (스텝)
#   autotune_entropy:         엔트로피 온도 자동 튜닝 여부
#   target_entropy_scale:     목표 엔트로피 스케일
#   initial_alpha:            초기 엔트로피 온도
