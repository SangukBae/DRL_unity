hyperparameters:
  # === 학습 기본 ===
  discount: 0.99
  batch_size: 256
  buffer_size: 1000000

  # === TQC 핵심 ===
  n_quantiles: 25                # (기존 TQC 경로에서만 사용)
  n_critics: 5                   # 안정화 후 5까지 확장 가능
  top_quantiles_to_drop_per_net: 1  # IEQN에선 한 단계 낮춰 시작 권장(기존 2 → 1)

  # === IEQN 전용 ===
  use_ieqn: true                 # IEQN 경로 활성화
  n_statistics: 128               # τ 샘플 수 (64~128 권장)
  kappa_quantiles: 0.0           # 0이면 순수 L1(Quantile), >0이면 Huber
  mapper_lr: 0.00007             # 7e-5
  tau_mapper: 0.5                # mapper 타깃 Polyak 계수

  # === 타깃 네트워크 ===
  tau: 0.005                     # critic 타깃 Polyak 계수
  target_update_interval: 1      # 매 스텝마다 Polyak 업데이트

  # === 엔트로피(온도) 설정 ===
  ent_coef: "auto_1.0"           # 자동 조절(초기값 1.0). 고정 사용 시 0.2 등 실수
  ent_coef_lr: 0.0003
  # target_entropy: -1.0         # 미지정 시 코드에서 -action_dim 사용

  # === 네트워크 폭/활성화/학습률 ===
  actor_hdim: 256
  actor_activ: "relu"            # "relu" | "elu"
  actor_lr: 0.0003

  critic_hdim: 256
  critic_activ: "elu"            # "relu" | "elu"
  critic_lr: 0.0003

  # === 체크포인트(TrainTD7 호환 루틴) ===
  reset_weight: 0.9
  steps_before_checkpointing: 40000
  max_eps_when_checkpointing: 50

  # === 우선순위 리플레이(옵션) ===
  prioritized: false
  alpha: 0.4
  min_priority: 1.0
